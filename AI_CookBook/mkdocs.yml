---
site_name: AI Agent Cookbook for WxCC
site_description: A practical guide for building secure, governed, and production-ready AI agents in WxCC
site_author: Chandramouli Vaithiyanathan
site_url: https://webexsamples.github.io/webex-ai-agents/
docs_dir: docs
copyright: Copyright &copy; 2026 Cisco Systems Inc. All Rights Reserved.

theme:
  name: material
  logo: assets/cisco-logo.png
  favicon: assets/cisco-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.integrate
    - content.tooltips
    - content.footnote.tooltips
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: false
      auto_caption: true
      caption_position: top

markdown_extensions:
  - md_in_html
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - tables
 
